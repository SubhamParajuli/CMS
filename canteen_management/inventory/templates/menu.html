{% extends "index.html" %}
{% block start %}

<!-- Header -->
<div class="d-flex justify-content-between align-items-center p-3 bg-dark text-light">
  <h3 class="mb-0">
    <i class="fa fa-utensils"></i> Canteen Menu
  </h3>
  <div class="d-flex align-items-center gap-2">
    <span>Welcome, {{ user.username }}</span>
    <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
      <i class="fa fa-sign-out-alt"></i> Logout
    </a>
  </div>
</div>

<div class="d-flex" style="height: calc(105vh - 100px);">

  <!-- RIGHT SIDE (Menu Items) -->
  <div class="flex-grow-1 bg-light p-3" style="flex:3.5;">
    <div class="container-fluid">
      <div class="row g-3">

        {% for item in inventory %}
        <!-- ITEM CARD -->
        <div class="col-lg-3 col-md-4 col-sm-6">
          <div class="card h-100 shadow-sm">
            <img 
              src="/media/{{ item.food_image }}" 
              class="card-img-top"
              alt="Item Image"
              style="object-fit: cover; height: 160px;"
            >
            <div class="card-body d-flex flex-column">
              <h6 class="card-title">{{item.item_name}}</h6>
              <p class="card-text text-muted mb-2">Rs {{item.price}}</p>

              <a href="/checkout/" class="btn btn-primary btn-sm mt-auto">
                <i class="fa fa-plus"></i> Add Item
              </a>
            </div>
          </div>
        </div>

          {% endfor %}
        </div>

      </div>
    </div>
  </div>

  <!-- LEFT SIDE (DO NOT TOUCH) -->
  <div style="flex:0.45; background-color: red;">
  </div>

</div>

{% endblock %}
